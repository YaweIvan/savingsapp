{% extends "base.html" %}
{% block title %}Add Transaction – {{ user.name }}{% endblock %}

{% block content %}
<div class="container-sm">
  <a href="{{ url_for('user_detail', user_id=user.id) }}" class="btn btn-outline btn-sm" style="margin-bottom:1.25rem;">← Back to {{ user.name }}</a>

  <h1 class="page-title">Add Transaction</h1>
  <p style="color:var(--gray-500); margin-bottom:1.5rem;">Recording a transaction for <strong>{{ user.name }}</strong></p>

  <div class="card">
    <form method="POST" action="{{ url_for('add_transaction', user_id=user.id) }}">

      <div class="form-group">
        <label>Transaction Type *</label>
        <select name="type" required>
          <option value="" disabled selected>Select type…</option>
          <option value="deposit">💚 Deposit</option>
          <option value="withdrawal">🔴 Withdrawal</option>
          <option value="loan">🔶 Loan / Borrowed</option>
          <option value="reward">🟣 Reward</option>
        </select>
      </div>

      <div class="form-group">
        <label>Amount *</label>
        <input type="number" name="amount" min="1" step="any" required placeholder="e.g. 50000" />
      </div>

      <div class="form-group">
        <label>Note (optional)</label>
        <textarea name="note" placeholder="e.g. Monthly contribution, Interest payment…"></textarea>
      </div>

      <div style="display:flex; gap:.75rem; margin-top:.5rem;">
        <button type="submit" class="btn btn-primary">Save Transaction</button>
        <a href="{{ url_for('user_detail', user_id=user.id) }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
