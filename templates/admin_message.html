{% extends "base.html" %}
{% block title %}Send Message – SavingsApp{% endblock %}

{% block content %}
<div class="container-sm">
  <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline btn-sm" style="margin-bottom:1.25rem;">← Dashboard</a>

  <h1 class="page-title">Send Message</h1>
  <div class="card">
    <form method="POST" action="{{ url_for('admin_message') }}">

      <div class="form-group">
        <label>Send To *</label>
        <select name="receiver_id" required>
          <option value="all">📢 All Members</option>
          {% for u in users %}
          <option value="{{ u.id }}" {% if request.args.get('uid') == u.id|string %}selected{% endif %}>
            {{ u.name }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Message *</label>
        <textarea name="message" rows="5" required placeholder="Type your message here…"></textarea>
      </div>

      <div style="display:flex; gap:.75rem;">
        <button type="submit" class="btn btn-primary">✉ Send</button>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
